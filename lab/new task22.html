<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>A Library Membership Registration Form</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="fname">Full Name:</label>
            <input type="text" name="fname" id="fname" required>
            <br/> <br/>
            <label for="mid">Membership ID:</label>
            <input type="text" name="mid" id="mid" required>
            <br/> <br/>
            <label for="email">Email:</label>
            <input type="text" name="email" id="email" required>
            <br/> <br/>
            <label for="phone">Phone:</label>
            <input type="tel" name="phone" id="phone" required>
            <br/> <br/>
            <label for="dob">Date of Birth:</label>
            <input type="date" name="dob" id="dob" required>
            <br><br>

            Gender:

            <input type="radio" name="Gender" id="female" value="female">
            <label for="female">Female</label>

            <input type="radio" name="Gender" id="male" value="male">
            <label for="male">Male</label>

            <input type="radio" name="Gender" id="others" value="others">
            <label for="others">Others</label>
            

            </fieldset>
            <br>

            <fieldset>
            <legend>Membership Information</legend>

            <label for="mtype">Membership Type</label>
            <select name="mtype" id="mtype">
                <option value="">Select Type</option>   
                <option value="student">Student</option>  
                <option value="faculty">Faculty</option>  
                <option value="researcher">Researcher</option>
                <option value="general member">General Member</option>
            </select>

            <br><br>


            <label for="mtype">Library Section</label>
            <select name="libsec" id="libsec">
                <option value="">Select Section</option>   
                <option value="scienceandtechnology">Science and Technology</option>  
                <option value="literature">Literature</option>  
                <option value="businesstudies">Business Studies</option>
                <option value="history">History</option>
                <option value="artsandculture">Arts and Culture</option>
                <br/>
                <br/>
             </select>

             <fieldset>

             <label for="favbookcat">Favourite Book Categories:</label>
             <br/>
             <input type="checkbox" name="favbookcat" id="favbookcat" value="Fiction">
             <label for="favbookcat">Fiction</label> <br/>
             <input type="checkbox" name="favbookcat" id="favbookcat" value="Non-Fiction">
             <label for="favbookcat">Non-Fiction</label> <br/>
             <input type="checkbox" name="favbookcat" id="favbookcat" value="Science">
             <label for="favbookcat">Science</label> <br/>
             <input type="checkbox" name="favbookcat" id="favbookcat" value="Technology">
             <label for="favbookcat">Technology</label> <br/>
             <input type="checkbox" name="favbookcat" id="favbookcat" value="Biography">
             <label for="favbookcat">Biography</label> <br/>
             <input type="checkbox" name="favbookcat" id="favbookcat" value="History">
             <label for="favbookcat">History</label> <br/>
             <br/><br/>
             
             <label for="service">Library Services:</label><br/>
             <input type="checkbox" name="service" id="service" value="Book Borrowing">
             <label for="service">Book Borrowing</label> <br/>
             <input type="checkbox" name="service" id="service" value="Digital Library Access">
             <label for="service">Digital Library Access</label> <br/>
             <input type="checkbox" name="service" id="service" value="Reading Room">
             <label for="service">Reading Room</label> <br/>
             <input type="checkbox" name="service" id="service" value="Research Assistance">
             <label for="service">Research Assistance</label> <br/>
             <br/> <br/>
            
             <fieldset>
     <legend>Additional Information</legend>
       
<label for="address"> Current Address:</label>
 <textarea name="address" id="address" rows="4" cols="40"></textarea>
    <br><br>
       
    <label for="contact">Emergency Contact Number :</label>
  <input type="tel" name="contact" id="contact" required>
   <br><br>
   
<label for="reason"> Reason for Joining the Library:</label>
<textarea name="reason" id="reason" rows="5" cols="40"></textarea>
    <br><br>
 
<label for="suggestion">Suggestions for Library Improvement:</label>
<textarea name="suggestion" id="suggestion" rows="5" cols="40"></textarea>
    <br><br>
 
 
    </fieldset>
    <br><br>
 
 
 
<input type="submit" value="Submit">
<input type="reset" value="Reset">

             


             


        



            






</body>
</html>
